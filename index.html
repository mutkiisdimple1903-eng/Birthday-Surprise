<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Wife ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
    overflow-x: hidden;
}

/* 💖 Heading */
h1 {
    margin-top: 30px;
    font-size: 28px;
    animation: glow 2s infinite alternate;
}
@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 25px #ff4b5c; }
}

/* ⏳ Countdown */
#countdown {
    font-size: 18px;
    margin: 10px;
}

/* 💌 Typewriter */
#typewriter {
    font-size: 16px;
    width: 90%;
    margin: auto;
    border-right: 2px solid white;
    white-space: nowrap;
    overflow: hidden;
}

/* 🎬 Slideshow */
.slideshow {
    width: 90%;
    margin: 20px auto;
}
.slide { display: none; }
.slide img {
    width: 100%;
    border-radius: 15px;
}

/* Button */
button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #ff4b5c;
    color: white;
}

/* ❤️ Hearts */
.heart {
    position: fixed;
    color: red;
    animation: float 5s linear infinite;
}
@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* 💌 Popup */
.popup {
    display: none;
    position: fixed;
    z-index: 999;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}
.popup-content {
    background: white;
    color: #333;
    width: 85%;
    max-width: 350px;
    margin: 30% auto;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}
.popup-content h2 { color: #ff4b5c; }

/* 🎆 Firework dots */
.firework {
    position: fixed;
    width: 5px;
    height: 5px;
    background: white;
    border-radius: 50%;
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday My Beautiful Wife ❤️</h1>

<div id="countdown"></div>

<div id="typewriter"></div>

<!-- 🎬 Slideshow -->
<div class="slideshow">
    <div class="slide"><img src="YOUR_PHOTO_1"></div>
    <div class="slide"><img src="YOUR_PHOTO_2"></div>
    <div class="slide"><img src="YOUR_PHOTO_3"></div>
    <div class="slide"><img src="YOUR_PHOTO_4"></div>
</div>

<button onclick="startFireworks()">Click My Love 💌</button>

<!-- 💌 Popup -->
<div id="lovePopup" class="popup">
  <div class="popup-content">
    <h2>💖 My Love Letter 💖</h2>
    <p>
      My Dear Wife ❤️ <br><br>
      You are my happiness, my peace, my everything 💕 <br><br>
      Every moment with you is special to me 😊 <br><br>
      I promise to love you forever 💘
    </p>
    <button onclick="closePopup()">Close 💌</button>
  </div>
</div>

<!-- 🎵 Music -->
<audio autoplay loop>
    <source src="YOUR_MUSIC_LINK" type="audio/mpeg">
</audio>

<script>
/* ⏳ Countdown */
const birthday = new Date("April 3, 2026 00:00:00").getTime();
setInterval(() => {
    const now = new Date().getTime();
    const gap = birthday - now;
    const d = Math.floor(gap/(1000*60*60*24));
    const h = Math.floor((gap%(1000*60*60*24))/(1000*60*60));
    const m = Math.floor((gap%(1000*60*60))/(1000*60));
    const s = Math.floor((gap%(1000*60))/1000);
    document.getElementById("countdown").innerHTML =
    "Countdown: "+d+"d "+h+"h "+m+"m "+s+"s";
},1000);

/* 💌 Typewriter */
const text = "You are my happiness, my peace, my everything ❤️ I love you forever 💕";
let i = 0;
(function typing(){
    if(i < text.length){
        document.getElementById("typewriter").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing,50);
    }
})();

/* 🎬 Slideshow */
let slideIndex=0;
(function showSlides(){
    let slides=document.getElementsByClassName("slide");
    for(let i=0;i<slides.length;i++){slides[i].style.display="none";}
    slideIndex++;
    if(slideIndex>slides.length){slideIndex=1;}
    slides[slideIndex-1].style.display="block";
    setTimeout(showSlides,2500);
})();

/* ❤️ Hearts */
setInterval(()=>{
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),5000);
},300);

/* 💌 Popup */
function openPopup(){document.getElementById("lovePopup").style.display="block";}
function closePopup(){document.getElementById("lovePopup").style.display="none";}
setTimeout(openPopup,2000);

/* 🎆 Fireworks */
function startFireworks(){
    for(let i=0;i<40;i++){
        let fw=document.createElement("div");
        fw.className="firework";
        fw.style.left="50%";
        fw.style.top="50%";
        fw.style.transform=translate(${Math.random()*200-100}px,${Math.random()*200-100}px);
        document.body.appendChild(fw);
        setTimeout(()=>fw.remove(),1000);
    }
}
</script>

</body>
</html>
